<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:#fff;
      padding:20px;
    }
    .box{
      width:min(420px,100%);
      background:rgba(255,255,255,.08);
      padding:28px;
      border-radius:18px;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
      backdrop-filter:blur(10px);
    }
    h2{margin-bottom:18px;text-align:center}
    input,button{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      font-size:16px;
      outline:none;
    }
    button{
      background:#2563eb;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    button:hover{background:#1d4ed8}
    .msg{margin-top:10px;color:#fca5a5;text-align:center;min-height:24px}
    a{display:block;text-align:center;margin-top:12px;color:#93c5fd;text-decoration:none}
  </style>
</head>
<body>
  <div class="box">
    <h2>Create Account</h2>
    <form id="signupForm">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Sign Up</button>
    </form>
    <div class="msg" id="msg"></div>
    <a id="loginLink" href="login.html">Already have an account? Login</a>
  </div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import {
      createUserWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const form = document.getElementById("signupForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const msg = document.getElementById("msg");
    const loginLink = document.getElementById("loginLink");

    const params = new URLSearchParams(window.location.search);
    const nextPage = params.get("next") || "index.html";

    loginLink.href = `login.html?next=${encodeURIComponent(nextPage)}`;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = nextPage;
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";

      try {
        await createUserWithEmailAndPassword(auth, email.value.trim(), password.value);
        window.location.href = nextPage;
      } catch (error) {
        msg.textContent = error.message;
      }
    });
  </script>
</body>
</html>
