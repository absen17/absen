<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darvas Page</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:18px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
}

#error{
    color:#ff6b6b;
    margin-top:12px;
    font-size:14px;
}
</style>
</head>

<body style="display:none;" data-theme="light">
    <script type="module" src="auth-guard.js"></script>

<div class="container">
    <h2>Welcome to Darvas's Page</h2>
    
    <input type="password" id="password" placeholder="Enter Password">
    
    <button onclick="checkPassword()">Unlock</button>
    
    <div id="error"></div>
</div>

<script>
function checkPassword(){
    let pass = document.getElementById("password").value;

    if(pass === "1234"){
        window.location.href = "darvas_setup.html";
    }else{
        document.getElementById("error").innerText = "Wrong Password!";
    }
}
</script>

</body>
</html>
