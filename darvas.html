<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Setups</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#050505;
    --glass:rgba(14,14,14,0.58);
    --glass-2:rgba(20,20,20,0.72);
    --text:#ffffff;
    --muted:#c7c7c7;
    --muted-2:#9ca3af;
    --red:#ef4444;
    --red-2:#b91c1c;
    --border:rgba(255,255,255,0.10);
    --shadow:0 18px 45px rgba(0,0,0,0.45);
}

body{
    font-family:Arial, sans-serif;
    color:var(--text);
    min-height:100vh;
    background:
        linear-gradient(180deg, rgba(0,0,0,0.62), rgba(0,0,0,0.90)),
        url("market-bg.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    padding:28px;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left, rgba(239,68,68,0.15), transparent 30%),
        radial-gradient(circle at top right, rgba(255,255,255,0.06), transparent 26%),
        radial-gradient(circle at bottom left, rgba(239,68,68,0.10), transparent 24%);
    pointer-events:none;
    z-index:-1;
}

.container{
    max-width:1240px;
    margin:auto;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:15px;
    margin-bottom:18px;
    flex-wrap:wrap;
    padding:18px 20px;
    border:1px solid var(--border);
    border-radius:24px;
    background:linear-gradient(135deg, rgba(10,10,10,0.88), rgba(30,30,30,0.62));
    box-shadow:var(--shadow);
    backdrop-filter: blur(16px);
}

.brand-wrap{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.top-bar h1{
    font-size:clamp(1.8rem, 4vw, 3rem);
    letter-spacing:-0.03em;
    line-height:1.1;
}

.top-bar .mini{
    color:var(--muted);
    font-size:0.95rem;
}

.logout-btn{
    text-decoration:none;
    background:linear-gradient(135deg,var(--red),var(--red-2));
    color:white;
    padding:11px 16px;
    border-radius:12px;
    font-size:14px;
    font-weight:700;
    transition:0.25s ease;
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 12px 24px rgba(239,68,68,0.22);
    white-space:nowrap;
}

.logout-btn:hover{
    transform:translateY(-2px);
    filter:brightness(1.05);
    box-shadow:0 16px 30px rgba(239,68,68,0.30);
}

.subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:24px;
    font-size:1rem;
    letter-spacing:0.01em;
}

.filter-box{
    text-align:center;
    margin-bottom:28px;
}

select{
    padding:12px 18px;
    border:1px solid rgba(255,255,255,0.12);
    border-radius:12px;
    font-size:15px;
    background:rgba(10,10,10,0.88);
    color:white;
    cursor:pointer;
    outline:none;
    box-shadow:var(--shadow);
    backdrop-filter: blur(12px);
}

.image-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:22px;
}

.card{
    position:relative;
    background:linear-gradient(180deg, rgba(20,20,20,0.82), rgba(10,10,10,0.92));
    border-radius:22px;
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    border:1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(14px);
    isolation:isolate;
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,0.10), transparent 40%);
    pointer-events:none;
    z-index:0;
}

.card:hover{
    transform:translateY(-8px);
    border-color:rgba(239,68,68,0.38);
    box-shadow:
        0 18px 45px rgba(0,0,0,0.50),
        0 0 0 1px rgba(239,68,68,0.20),
        0 0 24px rgba(239,68,68,0.18);
}

.card img{
    width:100%;
    height:225px;
    object-fit:cover;
    cursor:pointer;
    display:block;
    position:relative;
    z-index:1;
}

.card-content{
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:14px;
    position:relative;
    z-index:1;
    background:linear-gradient(180deg, rgba(10,10,10,0.10), rgba(10,10,10,0.30));
}

.card-text h3{
    margin-bottom:8px;
    font-size:21px;
    letter-spacing:-0.02em;
}

.card-text p{
    color:var(--muted);
    font-size:14px;
    line-height:1.45;
}

.tv-btn{
    text-decoration:none;
    background:linear-gradient(135deg,#0055ff,#1058d2);
    color:white;
    padding:9px 14px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    transition:0.25s ease;
    white-space:nowrap;
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:0 10px 22px rgba(239,68,68,0.22);
}

.tv-btn:hover{
    transform:scale(1.04);
    box-shadow:0 14px 28px rgba(239,68,68,0.30);
}

.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.94);
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:18px;
    backdrop-filter: blur(8px);
}

.popup img{
    max-width:min(96vw,1200px);
    max-height:92vh;
    border-radius:14px;
    box-shadow:0 20px 60px rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.12);
}

.close{
    position:absolute;
    top:18px;
    right:24px;
    font-size:42px;
    color:white;
    cursor:pointer;
    line-height:1;
    user-select:none;
    transition:0.2s ease;
}

.close:hover{
    color:#ff6b6b;
    transform:scale(1.08);
}

.empty-state{
    text-align:center;
    color:var(--muted);
    padding:30px 10px;
    grid-column:1 / -1;
    border:1px dashed rgba(255,255,255,0.16);
    border-radius:18px;
    background:rgba(0,0,0,0.22);
}

@media (max-width: 700px){
    body{
        padding:16px;
        background-attachment:scroll;
    }

    .top-bar{
        padding:16px;
        border-radius:20px;
    }

    .top-bar h1{
        font-size:1.85rem;
    }

    .card-content{
        flex-direction:column;
        align-items:flex-start;
    }

    .tv-btn{
        margin-top:4px;
    }

    .card img{
        height:200px;
    }
}
</style>
</head>

<body style="display:none;" data-theme="light">
<script type="module" src="auth-guard.js"></script>
<script src="darvas-data.js"></script>

<div class="container">

    <div class="top-bar">
        <div class="brand-wrap">
            <h1>Good Setups</h1>
        </div>
        <a class="logout-btn" href="#" onclick="logoutUser(); return false;">Logout</a>
    </div>

    <p class="subtitle">Select setup type to view matching charts</p>

    <div class="filter-box">
        <select id="setupFilter">
            <option value="all">All Setups</option>
            <option value="Humble">Humble</option>
            <option value="Ziddi">Ziddi</option>
            <option value="Momentum">Chalne wala pattern</option>
            <option value="Rounding Bottom">Rounding Bottom</option>
            <option value="VCP">CW&H/VCP</option>
            <option value="RH&S">RH&S</option>
            <option value="Monthly Breakout">Monthly Breakout</option>
            <option value="Weekly Breakout">Weekly Breakout</option>
        </select>
    </div>

    <div class="image-container" id="imageContainer"></div>
</div>

<div class="popup" id="popup">
    <span class="close" onclick="closeImage()">&times;</span>
    <img id="popup-img" alt="Expanded chart">
</div>

<script>
const items = [
  {
    title: "Nestle",
    type: "RH&S",
    setup: "Reverse Head & Shoulders",
    image: "image/nestle.png",
    chart: "https://www.tradingview.com/chart/?symbol=NSE:NESTLEIND"
  },
  {
    title: "KWIL",
    type: "VCP",
    setup: "VCP",
    image: "image/KWIL.png",
    chart: "https://www.tradingview.com/chart/?symbol=NSE:KWIL"
  },
  {
    title: "KRISHNADEF",
    type: "Monthly Breakout",
    setup: "Monthly Breakout",
    image: "image/KRISHNADEF.png",
    chart: "https://www.tradingview.com/chart/?symbol=NSE:KRISHNADEF"
  },
  {
    title: "SCI",
    type: "VCP",
    setup: "VCP",
    image: "image/SCI.png",
    chart: "https://www.tradingview.com/chart/?symbol=NSE:SCI"
  },
  {
    title: "NAVA",
    type: "Momentum",
    setup: "Chalne wala pattern",
    image: "image/NAVA.png",
    chart: "https://www.tradingview.com/chart/?symbol=NSE:NAVA"
  }
];

const imageContainer = document.getElementById("imageContainer");
const setupFilter = document.querySelector("select");

function openImage(src){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popup-img").src = src;
}

function closeImage(){
  document.getElementById("popup").style.display = "none";
}

function renderCards(type = "all"){
  const filtered = type === "all"
    ? items
    : items.filter(item => item.type === type);

  if (!filtered.length) {
    imageContainer.innerHTML = `
      <div class="empty-state">
        No setups found for this filter.
      </div>
    `;
    return;
  }

  imageContainer.innerHTML = filtered.map(item => `
    <div class="card" data-type="${item.type}">
      <img src="${item.image}" onclick="openImage(this.src)" alt="${item.title} chart">
      <div class="card-content">
        <div class="card-text">
          <h3>${item.title}</h3>
          <p>${item.setup}</p>
        </div>
        <a href="${item.chart}" target="_blank" class="tv-btn">📈 Chart</a>
      </div>
    </div>
  `).join("");
}

setupFilter.addEventListener("change", (e) => {
  renderCards(e.target.value);
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape"){
    closeImage();
  }
});

renderCards("all");
</script>

</body>
</html>
